[build]
  base = "ResumeApp"
  command = "npm run build"
  publish = "wwwroot/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/resume.pdf"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
